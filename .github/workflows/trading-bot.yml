name: Kripto Trading Bot

"on":
  schedule:
    # Her 5 dakikada bir çalışır (UTC saatine göre)
    - cron: '*/5 * * * *'
  workflow_dispatch: {} # Elle tetiklemek için (test amaçlı)

permissions:
  contents: write # state.json'u commit edebilmek için

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Botu çalıştır
        env:
          BINANCE_TESTNET_API_KEY: ${{ secrets.BINANCE_TESTNET_API_KEY }}
          BINANCE_TESTNET_SECRET_KEY: ${{ secrets.BINANCE_TESTNET_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Durumu kaydet (commit)
        run: |
          git config --global user.name "Trading Bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Bot güncellemesi $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
